<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TomaHawk / 战斧 Naval Sandbox</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="map" aria-label="TomaHawk tactical map"></canvas>
      <section id="left-rail" class="panel">
        <button data-tool="blue" class="tool blue" title="Add blue DDG">BLUE</button>
        <button data-tool="red" class="tool red" title="Add red DDG">RED</button>
        <select id="ship-class" class="tool" title="Ship class for placement">
          <option value="DDG">DDG</option>
          <option value="CCG">CCG</option>
          <option value="BBG">BBG</option>
          <option value="FFG">FFG</option>
        </select>
        <button id="reset" class="tool" title="Revert scenario">REV</button>
      </section>
      <section id="map-options" class="panel">
        <label><input id="filter-grid" type="checkbox" checked /> GRID</label>
        <label><input id="filter-tracks" type="checkbox" checked /> TRACKS</label>
        <label><input id="filter-radar" type="checkbox" /> RADAR</label>
        <label><input id="filter-ranges" type="checkbox" checked /> WEZ</label>
        <select id="ranges-mode" title="Weapon range ring mode">
          <option value="all" selected>ALL</option>
          <option value="selected">SEL</option>
          <option value="off">OFF</option>
        </select>
        <label><input id="filter-missiles" type="checkbox" checked /> WEAPONS</label>
      </section>
      <section id="focus-strip" class="panel"></section>
      <section id="right-panel" class="panel">
        <div id="unit-tab" class="tab-body"></div>
      </section>
      <section id="bottom-bar" class="panel">
        <button id="play">▶</button>
        <button id="step">STEP</button>
        <label>SPD <input id="speed" type="range" min="1" max="60" value="8" /></label>
        <span id="clock">00:00</span>
        <span id="cursor">0.0, 0.0 nm</span>
        <span id="status">Place one blue and one red ship, then press play.</span>
        <button id="save">SAVE</button>
        <button id="load">LOAD</button>
        <button id="aar">AAR</button>
        <button id="copy-log">COPY LOG</button>
        <input id="load-file" type="file" accept="application/json" hidden />
      </section>
      <button id="copy-fire-log" class="panel">COPY FIRE LOG</button>
      <section id="event-log" class="panel"></section>
    </main>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
