name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # The project has no runtime or dev dependencies, so there is nothing to
      # install — go straight to the built-in test runner.
      - run: npm test
